name: Refresh data snapshot

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build snapshot
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/build_snapshot.py

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore(data): weekly snapshot refresh [skip ci]"
          # Retry up to 3x with rebase to handle the race where someone
          # pushes during the build.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling --rebase and retrying"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts"
          exit 1
