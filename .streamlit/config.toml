[theme]
base = "dark"
primaryColor = "#0ea5e9"
backgroundColor = "#0a0a0a"
secondaryBackgroundColor = "#171717"
textColor = "#e4e4e7"
linkColor = "#38bdf8"
font = "sans serif"
headingFont = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
runOnSave = false
# HF's reverse proxy mangles compressed WS frames -> blank page; disable all three.
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false
